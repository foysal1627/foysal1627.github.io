/* Navigation Bar */
nav {
    text-align: center;
    margin-bottom: 20px;
}

nav a.slide-btn {
    display: inline-block;
    margin: 0 10px;
    padding: 10px 20px;
    font-size: 16px;
    font-family: courier;
    font-weight: bold;
    color: #fff;
    background-color: #333;
    text-decoration: none;
    border-radius: 25px;
    transition: color 0.8s ease;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    position: relative;
    overflow: hidden;
    z-index: 1;
    outline: none;
    border: none; 
}


nav a.slide-btn:focus,
nav a.slide-btn:active {
    outline: none;
    box-shadow: none;
}

nav a.slide-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background-color: #4CAF50;
    z-index: -1;
    border-radius: 25px;
    transition: transform 0.5s ease-in-out;
    transform: translateX(-100%);
}


nav a.slide-btn.active::after {
    transform: translateX(0);
}

        /* Horizontal Line */
        hr {
            border: 0;
            height: 1px;
            background: #ccc;
            margin: 20px 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav a {
                display: block;
                margin: 10px auto;
                width: 80%;
                text-align: center;
            }
        }

<script>
document.addEventListener("DOMContentLoaded", function() {
    const postContents = document.querySelectorAll('.post-content');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('zoomIn');
                observer.unobserve(entry.target);
            }
        });
    }, {
        threshold: 0.1 
    });

    postContents.forEach(content => {
        observer.observe(content);
    });
});
</script>
    
 <script>
     
        document.querySelectorAll('.slide-btn').forEach(button => {
    button.addEventListener('click', function(e) {
        
        this.classList.remove('active');
        void this.offsetWidth; // Repaint trigger (CSS animation reset)
        
        this.classList.add('active');

        
        setTimeout(() => {
            this.classList.remove('active');
        }, 500);
    });


    button.addEventListener('mousedown', function(e) {
        e.preventDefault();
    });
});
    </script>
